# Render Blueprint — optional. If you manage services only in the dashboard, skip this file
# and add the rewrite rule manually (see comment at bottom).
#
# SPA (React Router): without a rewrite, /admin and refreshes return 404 from the CDN.
# Dashboard path: Static Site → Redirects/Rewrites → Add rule:
#   Action: Rewrite | Source: /* | Destination: /index.html
# Docs: https://render.com/docs/redirects-rewrites

services:
  - type: web
    name: ecommerce-frontend
    runtime: static
    rootDir: ecommerce-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Set in Dashboard → Environment (required for production API base URL at build time):
    # VITE_API_URL = https://your-backend.onrender.com
